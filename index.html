<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Tạm Đóng</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
        }
        .container {
            padding: 3rem;
            border-radius: 15px;
            background: #2d2d2d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #ff4d4d;
            margin-bottom: 15px;
            font-weight: 600;
        }
        p {
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .contact-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #00d4ff;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
        }
        .contact-btn:hover {
            background-color: #00b3d6;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tạm Thời Đóng Cửa</h1>
    <p>Website đang tạm dừng hoạt động để cập nhật hệ thống.<br> Nếu bạn cần lấy file gấp, vui lòng inbox trực tiếp cho Admin nhé!</p>
    
    <a href="#" class="contact-btn">Inbox Cho Admin</a>
</div>

</body>
</html>
